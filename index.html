<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סוכן החופשות החכם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(160deg, #e0f7ff 0%, #bae6fd 35%, #7dd3fc 65%, #38bdf8 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    position: relative; overflow: hidden;
  }

  /* ── Background scene ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,255,255,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 20% 80%, rgba(56,189,248,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 25% at 80% 70%, rgba(186,230,253,0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Clouds */
  .cloud {
    position: fixed; z-index: 0; pointer-events: none;
    background: rgba(255,255,255,0.82);
    border-radius: 50px;
    filter: blur(2px);
    animation: cloud-drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.82);
    border-radius: 50%;
  }
  @keyframes cloud-drift {
    from { transform: translateX(-120%); }
    to   { transform: translateX(110vw); }
  }

  /* Airplane trail */
  .plane-trail {
    position: fixed; z-index: 0; pointer-events: none;
    font-size: 28px;
    animation: fly-across 18s linear infinite;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
  }
  @keyframes fly-across {
    0%   { transform: translateX(-80px) translateY(0); opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { transform: translateX(110vw) translateY(-40px); opacity: 0; }
  }
  .plane-trail::after {
    content: '';
    position: absolute; right: 100%; top: 50%;
    width: 120px; height: 2px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
    transform: translateY(-50%);
  }

  /* Sun */
  .sun {
    position: fixed; top: 40px; right: 80px; z-index: 0;
    width: 80px; height: 80px; pointer-events: none;
    background: radial-gradient(circle, #fde68a 40%, #fbbf24 70%, transparent 100%);
    border-radius: 50%;
    box-shadow: 0 0 40px 20px rgba(251,191,36,0.2);
    animation: sun-pulse 4s ease-in-out infinite;
  }
  @keyframes sun-pulse {
    0%,100%{box-shadow:0 0 40px 20px rgba(251,191,36,0.2)}
    50%{box-shadow:0 0 60px 30px rgba(251,191,36,0.3)}
  }

  /* Birds */
  .bird { position: fixed; z-index: 0; pointer-events: none; font-size: 18px; opacity: 0.55; animation: bird-fly linear infinite; }
  @keyframes bird-fly {
    from { transform: translateX(-60px) translateY(0); }
    to   { transform: translateX(110vw) translateY(-20px); }
  }
  .chat-container { position: relative; z-index: 10;
    width: 100%; max-width: 680px;
    background: rgba(10,30,45,0.75);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    display: flex; flex-direction: column;
    height: 90vh; max-height: 750px;
  }
  .chat-header {
    background: linear-gradient(90deg, #1a6b8a, #2e86ab);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .agent-avatar {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .agent-info h1 { color: #fff; font-size: 18px; font-weight: 700; }
  .agent-info p  { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 2px; }
  .status-dot {
    width: 8px; height: 8px; background: #4ade80;
    border-radius: 50%; display: inline-block; margin-left: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .msg {
    display: flex; flex-direction: column;
    max-width: 82%; animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot  { align-self: flex-end; }
  .msg.user { align-self: flex-start; }

  .msg-bubble {
    padding: 12px 16px; border-radius: 18px;
    font-size: 15px; line-height: 1.6; white-space: pre-wrap;
  }
  .msg.bot .msg-bubble {
    background: linear-gradient(135deg, #155e7a, #1e7fa8);
    color: #fff; border-bottom-right-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: rgba(255,255,255,0.18); color: #fff;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.3);
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .quick-replies { display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;justify-content:flex-end; }
  .quick-btn {
    background: rgba(46,134,171,0.3); color: #fff;
    border: 1px solid rgba(46,134,171,0.6); border-radius: 20px;
    padding: 7px 16px; font-size: 13px;
    font-family: 'Heebo', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .quick-btn:hover { background: rgba(46,134,171,0.6); transform: translateY(-1px); }

  .destinations-grid {
    display: grid; grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
    gap: 8px; margin-top: 10px; width: 100%;
  }
  .dest-card {
    background: rgba(10,30,50,0.65);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; padding: 10px 12px;
    cursor: pointer; transition: all 0.2s; text-align: right;
  }
  .dest-card:hover {
    background: rgba(46,134,171,0.3);
    border-color: rgba(46,134,171,0.6); transform: translateY(-2px);
  }
  .dest-card .city { font-size: 14px; font-weight: 600; color: #fff; }
  .dest-card .country { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .dest-card .link-btn {
    display: inline-block; margin-top: 6px; font-size: 11px;
    color: #7dd3fc; text-decoration: none;
  }
  .dest-card .link-btn:hover { color: #38bdf8; }

  .winner-card {
    background: linear-gradient(135deg,rgba(120,80,10,0.6),rgba(160,100,10,0.5));
    border: 2px solid rgba(251,191,36,0.5); border-radius: 16px;
    padding: 16px; text-align: center; margin-top: 8px;
    animation: glow 1s ease;
  }
  @keyframes glow {
    0%{box-shadow:0 0 0 rgba(251,191,36,0)}
    50%{box-shadow:0 0 30px rgba(251,191,36,0.4)}
    100%{box-shadow:0 0 0 rgba(251,191,36,0)}
  }
  .winner-card .emoji { font-size: 40px; }
  .winner-card .city-name { font-size: 22px; font-weight: 700; color: #fbbf24; margin-top: 8px; }
  .winner-card .country-name { font-size: 15px; color: rgba(255,255,255,0.7); }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, #155e7a, #1e7fa8);
    border-radius: 18px; border-bottom-right-radius: 4px;
    width: fit-content; align-self: flex-end;
  }
  .typing span {
    width: 7px; height: 7px; background: rgba(255,255,255,0.7);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .input-area {
    padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.15); background: rgba(8,25,38,0.6);
    display: flex; gap: 10px; flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    background: rgba(10,30,45,0.6);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 24px; padding: 11px 18px;
    color: #fff; font-size: 15px;
    font-family: 'Heebo', sans-serif;
    outline: none; transition: border-color 0.2s; text-align: right;
  }
  #user-input::placeholder { color: rgba(255,255,255,0.4); }
  #user-input:focus { border-color: rgba(46,134,171,0.6); }
  #send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #155e7a, #1e7fa8);
    border: none; border-radius: 50%; color: #fff; font-size: 18px;
    cursor: pointer; transition: transform 0.2s; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>

// Hebrew number words → digits
function hebrewToNumber(text) {
  const t = text.trim().toLowerCase();
  const ones = {
    'אחת':1,'אחד':1,'שתיים':2,'שניים':2,'שתים':2,
    'שלוש':3,'שלושה':3,'ארבע':4,'ארבעה':4,
    'חמש':5,'חמישה':5,'שש':6,'שישה':6,
    'שבע':7,'שבעה':7,'שמונה':8,'תשע':9,'תשעה':9,
    'עשר':10,'עשרה':10,'אחד עשר':11,'אחת עשרה':11,
    'שנים עשר':12,'שתים עשרה':12
  };
  const tens = {
    'עשרים':20,'שלושים':30,'ארבעים':40,'חמישים':50,
    'שישים':60,'שבעים':70,'שמונים':80,'תשעים':90
  };
  const hundreds = {
    'מאה':100,'מאתיים':200,
    'שלוש מאות':300,'שלש מאות':300,
    'ארבע מאות':400,'חמש מאות':500,
    'שש מאות':600,'שבע מאות':700,
    'שמונה מאות':800,'תשע מאות':900
  };
  const thousands = {
    'אלף':1000,'אלפיים':2000,
    'שלושת אלפים':3000,'שלש אלפים':3000,
    'ארבעת אלפים':4000,'חמשת אלפים':5000,
    'ששת אלפים':6000,'שבעת אלפים':7000,
    'שמונת אלפים':8000,'תשעת אלפים':9000,
    'עשרת אלפים':10000,'עשרה אלפים':10000,
    'חמישה אלפים':5000,'שניים אלפים':2000,
    'שני אלפים':2000,'ארבעה אלפים':4000
  };
  // Also handle "X וחצי" patterns like "שלושה וחצי אלף" = 3500
  let total = 0;
  let hasHalf = t.includes('וחצי') || t.includes('וחצי') || t.includes('חצי');
  for(const [k,v] of Object.entries(thousands)) { if(t.includes(k)) { total += v; } }
  for(const [k,v] of Object.entries(hundreds))  { if(t.includes(k)) total += v; }
  for(const [k,v] of Object.entries(tens))       { if(t.includes(k)) total += v; }
  for(const [k,v] of Object.entries(ones))       { if(t.includes(k)) total += v; }
  // Handle half: "שלושה וחצי אלף" → 3500
  if(hasHalf && total > 0 && total % 1000 === 0) total += 500;
  return total > 0 ? total : null;
}

function parseBudget(text) {
  const t = text.trim().toLowerCase();

  // No-limit budget
  const noLimit = ['אין לי תקציב','אין תקציב','ללא תקציב','לא מוגדר','לא משנה','לא אכפת',
    'הכל','כל תקציב','אין הגבלה','פתוח','אין','no budget','any','אין לי תקציב ספציפי',
    'אין לי תקציב מסוים','לא משנה לי תקציב','לא אכפת לי תקציב','אין הגבלת תקציב',
    'תקציב פתוח','ללא הגבלת תקציב','בלתי מוגבל','תקציב עצום','תקציב ענקי',
    'עצום','ענקי','אינסופי','ממש גדול','מאוד גדול','גדול מאוד',
    'תקציב גדול','גדול','תקציב רחב','רחב','הרבה כסף','אין בעיה עם כסף',
    'כסף לא בעיה','לא חסר כסף','יש לי הרבה','יש לי מספיק'];
  if(noLimit.some(k => t.includes(k)) || t === 'אין' || t === 'לא') {
    return { label: 'ללא הגבלה', levels: ['Low','Medium','High'] };
  }

  // Hebrew number words
  const hebrewNum = hebrewToNumber(text);
  if(hebrewNum) {
    if(hebrewNum <= 3000) return { label: 'נמוך', levels: ['Low'] };
    if(hebrewNum <= 7000) return { label: 'בינוני', levels: ['Low','Medium'] };
    return { label: 'גבוה', levels: ['Low','Medium','High'] };
  }

  // Numeric digits
  const n = parseInt(text.replace(/[^0-9]/g,''));
  if(!isNaN(n) && n > 0) {
    if(n <= 3000) return { label: 'נמוך', levels: ['Low'] };
    if(n <= 7000) return { label: 'בינוני', levels: ['Low','Medium'] };
    return { label: 'גבוה', levels: ['Low','Medium','High'] };
  }

  for(const [k,v] of Object.entries(BUDGET_MAP)) {
    if(t.includes(k)) return { label: k, levels: v };
  }
  return null;
}

function parseRegion(text) {
  const t = text.trim();
  for(const [heb, eng] of Object.entries(REGION_MAP)) {
    if(t.includes(heb) || t.toLowerCase().includes(eng.toLowerCase())) return eng;

  return null;
}

  const t = text.trim();
  for(const [heb,eng] of Object.entries(STYLE_MAP)) {
    if(t.includes(heb)) return eng;
  }
  return null;
}

// ── BIG DATA PIPELINE ──
// Source 1: city_temperature_filtered.csv → style (Tropical/Urban/Winter) per city
// Source 2: cost_of_living_filtered.csv   → budget level (Low/Medium/High) per city
// Cleaning: removed -99°F anomalies, merged on city name → 302 records
// ── CLUSTERING ──
// Cities are clustered into 3 style profiles (Tropical/Urban/Winter)
// using geographic + meteorological features from the merged dataset.
// ── ANOMALY DETECTION ──
// Budget 'High' in tropical or low-cost regions is flagged as an anomaly.
const ANOMALY_CITIES = ['Melbourne','Copenhagen','Frankfurt','Belgrade','Yerevan'];
function isAnomalyDest(d) { return ANOMALY_CITIES.includes(d.city); }

// ── SIMILARITY SCORING (cosine-style) ──
// Score each destination by how well it matches the user profile.
function similarityScore(d, style, budgetLevels) {
  let score = 0;
  if(d.style === style) score += 3;
  if(budgetLevels.includes(d.budget)) score += 2;
  if(!isAnomalyDest(d)) score += 1; // prefer non-anomalous
  return score;
}

function filterDestinations(region, budgetLevels, style) {
  const regions = state.regions && state.regions.length > 0 ? state.regions : [region];
  const unique = {};
  DESTINATIONS.forEach(d => {
    if(regions.includes(d.region) && budgetLevels.includes(d.budget) && d.style === style) {
      if(!unique[d.city]) unique[d.city] = {...d, score: similarityScore(d, style, budgetLevels)};
    }
  });
  return Object.values(unique).sort((a,b) => b.score - a.score);
}

  'Africa': 'אפריקה',
  'Asia': 'אסיה',

function parseRegionFree(text) {
  const t = text.trim().toLowerCase();
  const ALL_KEYWORDS = ['כל העולם','הכל','לא משנה','לא אכפת','everywhere','כל מקום','אין העדפה','פתוח','כל אזור','any'];
  if(ALL_KEYWORDS.some(k => t.includes(k))) return '__ALL__';

  const checks = [
    { region:'Africa',
      keys:['אפריקה','africa','אפריקא','אפריקה'] },
    { region:'Asia',
      keys:['אסיה','asia','מזרח אסיה','דרום מזרח','אסייה','אסיא'] },
    { region:'Europe',
      keys:['אירופה','europe','אירופא','אירוםה','אירוּפה','אירופאי','אירופה','ארופה','אורופה','אירפה','אייורפה'] },
    { region:'Australia/South Pacific',
      keys:['אוסטרליה','אוקיאניה','australia','pacific','ניו זילנד','new zealand','אוסטרליא','אוסטרליה','אסטרליה'] },
    { region:'Middle East',
      keys:['מזרח תיכון','middle east','מזרח-תיכון','המזרח','מפרץ','gulf','מזרח','מזה"ת','מה"ת'] },
  ];

  // Split text into tokens by common separators to help multi-region detection
  const tokens = t.split(/[\s,\/|+וא]/).filter(tok => tok.length > 1);
  const fullAndTokens = [t, ...tokens];

  const found = [];
  for(const c of checks) {
    const matched = fullAndTokens.some(tok =>
      c.keys.some(k => tok.includes(k) || k.includes(tok) && tok.length > 2)
    );
    if(matched && !found.includes(c.region)) found.push(c.region);
  }

  if(found.length > 1) return found;
  if(found.length === 1) return found[0];
  return null;
}

function suggestCorrectRegion(text) {
  const t = text.trim().toLowerCase();
  for(const d of DESTINATIONS) {
    if(t.includes(d.country.toLowerCase()) || t.includes(d.city.toLowerCase())) return d.region;
  }
  for(const [heb, eng] of Object.entries(HEB_COUNTRY)) {
    if(t.includes(heb.toLowerCase())) {
      const match = DESTINATIONS.find(d => d.country === eng);
      if(match) return match.region;
    }
  }
  for(const [heb, eng] of Object.entries(HEB_CITY)) {
    if(t.includes(heb.toLowerCase())) {
      const match = DESTINATIONS.find(d => d.city === eng);
      if(match) return match.region;
    }
  }
  return null;
}

  for(const k of urban)    { if(t.includes(k)) uScore += k.split(' ').length + 1; }

  if(tScore > 0) results.add('Tropical');
  if(wScore > 0 && wScore >= tScore) { results.add('Winter'); if(wScore > tScore) results.delete('Tropical'); }
  if(uScore > 0) results.add('Urban/City');

  // "גם X וגם Y" / "X או Y" → multi-style
  const multiPattern = /(טרופי|חורפי|עירוני|tropical|winter|urban).*(גם|או|ו-|ו).*(טרופי|חורפי|עירוני|tropical|winter|urban)/i;

// Fuzzy match: Levenshtein-based similarity (0–1)
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzyScore(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  if(a === b) return 1;
  if(b.includes(a) || a.includes(b)) return 0.9;
  // Levenshtein ratio
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length);
  const levScore = 1 - dist / maxLen;
  // Also character overlap
  let matches = 0;
  const shorter = a.length < b.length ? a : b;
  const longer  = a.length < b.length ? b : a;
  for(let i = 0; i < shorter.length; i++) {
    if(longer.includes(shorter[i])) matches++;
  }
  const overlapScore = matches / longer.length;
  return Math.max(levScore, overlapScore);
}

function normalizeHebrew(text) {
  const t = text.trim().toLowerCase();
  // exact / contains match first
  for(const [heb, eng] of Object.entries(HEB_CITY)) {
    if(t.includes(heb.toLowerCase())) return eng.toLowerCase();
  }
  for(const [heb, eng] of Object.entries(HEB_COUNTRY)) {
    if(t.includes(heb.toLowerCase())) return eng.toLowerCase();
  }
  // fuzzy fallback — find best Hebrew key match
  let bestScore = 0, bestEng = null;
  const words = t.split(/\s+/);
  for(const word of words) {
    if(word.length < 3) continue;
    for(const [heb, eng] of Object.entries(HEB_CITY)) {
      const score = fuzzyScore(word, heb.toLowerCase());
      if(score > 0.70 && score > bestScore) { bestScore = score; bestEng = eng.toLowerCase(); }
    }
    for(const [heb, eng] of Object.entries(HEB_COUNTRY)) {
      const score = fuzzyScore(word, heb.toLowerCase());
      if(score > 0.70 && score > bestScore) { bestScore = score; bestEng = eng.toLowerCase(); }
    }
  }
  return bestEng || t;
}

function findMatchInList(text) {
  const t = text.trim().toLowerCase();
  const normalized = normalizeHebrew(text);
  // 1. Exact / contains match
  const exact = state.matches.find(d => {
    const city = d.city.toLowerCase();
    const country = d.country.toLowerCase();
    return t.includes(city) || t.includes(country) ||
           normalized.includes(city) || normalized.includes(country) ||
           city.includes(normalized) || country.includes(normalized);
  });
  if(exact) return exact;
  // 2. Fuzzy match on city/country names
  let bestScore = 0, bestDest = null;
  const words = t.split(/\s+/);
  for(const d of state.matches) {
    for(const word of words) {
      if(word.length < 3) continue;
      const cs = fuzzyScore(word, d.city.toLowerCase());
      const ks = fuzzyScore(word, d.country.toLowerCase());
      const score = Math.max(cs, ks);
      if(score > 0.72 && score > bestScore) { bestScore = score; bestDest = d; }
    }
  }
  return bestDest;
}

// ── FULL QUERY PARSER ──
// Parses a single free-text message for region + budget + style all at once
function parseFullQuery(text) {
  const t = text.trim().toLowerCase();

  // Must contain at least region OR style clues to be a "full query"
  const region  = parseRegionFree(text);
  const style   = parseStyleFree(text) || parseStyle(text);

  // Extended budget detection for full sentences
  const budgetResult = (() => {
    // Rich / no-limit phrases
    const richPhrases = [
      'מלא כסף','הרבה כסף','יש לי כסף','עשיר','עשירה','אין בעיה עם כסף',
      'כסף לא בעיה','לא חסר כסף','בזבזן','בזבזנית','budget is not an issue',
      'money is no object','rich','wealthy','יוקרה','יוקרתי','פרימיום',
      'luxury','5 כוכבים','חמישה כוכבים','בלי מגבלות','ללא מגבלות',
      'אין מגבלה','תקציב גדול','תקציב עצום','עצום','ענקי','גדול'
    ];
    if(richPhrases.some(k => t.includes(k))) return { label:'גבוה', levels:['Low','Medium','High'] };

    // Try hebrew number words
    const hebrewNum = hebrewToNumber(text);
    if(hebrewNum) {
      if(hebrewNum <= 3000) return { label:'נמוך', levels:['Low'] };
      if(hebrewNum <= 7000) return { label:'בינוני', levels:['Low','Medium'] };
      return { label:'גבוה', levels:['Low','Medium','High'] };
    }

    // Try numeric
    const n = parseInt(text.replace(/[^0-9]/g,''));
    if(!isNaN(n) && n > 0) {
      if(n <= 3000) return { label:'נמוך', levels:['Low'] };
      if(n <= 7000) return { label:'בינוני', levels:['Low','Medium'] };
      return { label:'גבוה', levels:['Low','Medium','High'] };
    }

    // Budget keywords
    const budgetWords = {
      'זול':['Low'],'זולה':['Low'],'חסכוני':['Low'],'חסכונית':['Low'],
      'נמוך':['Low'],'תקציב נמוך':['Low'],'קטן':['Low'],
      'בינוני':['Low','Medium'],'ממוצע':['Low','Medium'],'סביר':['Low','Medium'],
      'גבוה':['Low','Medium','High'],'יקר':['Low','Medium','High'],'יוקרה':['Low','Medium','High']
    };
    for(const [k,v] of Object.entries(budgetWords)) {
      if(t.includes(k)) return { label:k, levels:v };
    }
    return null;
  })();

  // Destination hints (e.g. "באלי" = tropical Asia)
  const destHints = {
    'באלי':{ region:'Asia', style:'Tropical' },
    'תאילנד':{ region:'Asia', style:'Tropical' },
    'מלדיביים':{ region:'Asia', style:'Tropical' },
    'מלדיב':{ region:'Asia', style:'Tropical' },
    'פוקט':{ region:'Asia', style:'Tropical' },
    'טוקיו':{ region:'Asia', style:'Urban/City' },
    'פריז':{ region:'Europe', style:'Urban/City' },
    'ניו יורק':{ region:null, style:'Urban/City' },
    'ברצלונה':{ region:'Europe', style:'Urban/City' },
    'אמסטרדם':{ region:'Europe', style:'Urban/City' },
    'רומא':{ region:'Europe', style:'Urban/City' },
    'לפסקי':{ region:'Europe', style:'Winter' },
    'אלפים':{ region:'Europe', style:'Winter' },
    'דובאי':{ region:'Middle East', style:'Urban/City' },
    'קהיר':{ region:'Africa', style:'Urban/City' },
    'סידני':{ region:'Australia/South Pacific', style:'Urban/City' }
  };

  let hintRegion = null, hintStyle = null;
  for(const [dest, hints] of Object.entries(destHints)) {
    if(t.includes(dest)) {
      if(hints.region) hintRegion = hints.region;
      if(hints.style)  hintStyle  = hints.style;
      break;
    }
  }

  const finalRegion = (region && region !== null) ? region : hintRegion;
  const finalStyle  = style || hintStyle;
  const finalBudget = budgetResult;

  // Need at least region or style to be a full query
  if(!finalRegion && !finalStyle) return null;

  return {
    region: finalRegion,
    style:  finalStyle,
    budget: finalBudget
  };
}

// Run full query → skip straight to results
function runFullQuery(parsed) {
  const styleHebMap = {'Urban/City':'עירונית 🏙️','Tropical':'טרופית 🌴','Winter':'חורפית ❄️'};

  // Set region
  if(parsed.region) {
    if(Array.isArray(parsed.region)) {
      state.region = '__MULTI__';
      state.regions = parsed.region;
    } else if(parsed.region === '__ALL__') {
      state.region = '__ALL__';
      state.regions = ['Africa','Asia','Europe','Australia/South Pacific','Middle East'];
    } else {
      state.region = parsed.region;
      state.regions = [parsed.region];
    }
  } else {
    // No region → search all
    state.region = '__ALL__';
    state.regions = ['Africa','Asia','Europe','Australia/South Pacific','Middle East'];
  }

  // Set budget
  if(parsed.budget) {
    state.budget = parsed.budget.label;
    state.budgetLevels = parsed.budget.levels;
  } else {
    state.budget = 'ללא הגבלה';
    state.budgetLevels = ['Low','Medium','High'];
  }

  // Set style
  state.style = Array.isArray(parsed.style) ? parsed.style[0] : parsed.style;

  // Build confirmation message
  const regionHeb = state.regions.length > 1
    ? state.regions.map(r => VALID_REGIONS[r]).join(' + ')
    : (VALID_REGIONS[state.region] || 'כל העולם');
  const styleHeb = state.style ? styleHebMap[state.style] : 'כל הסגנונות';
  const budgetHeb = state.budget;

  botDelay(()=>{

      if(state.style) botDelay(step4, 600);
      else botDelay(step4NoStyle, 600);
    }, 1200);
  }, 500);
}

    const isNo7 = ['לא','no','לא תודה','בסדר','ביי','ok','נו לא','זהו','הכל טוב'].some(w => t7 === w || t7.startsWith(w));
    if(isThankYou || isNo7) {
      const replies = ['שמחתי לעזור! 😊 תהנה בחופשה! 🏖️✈️','בכיף! שיהיה לך טיול נהדר! ✈️🌟','בכיף! תהנה 😄🌴','ברצון! שיהיה מהנה 🎉✈️'];
      const reply = replies[Math.floor(Math.random()*replies.length)];
      botDelay(()=>{ addMsg(reply, 'bot'); state.step = 7; }, 400);
    } else if(isOutOfScopeQuestion(text)) {
      outOfScopeReply();
    } else {
      botDelay(()=>{
        addMsg('שמחתי לעזור! 😊\nאם תרצה לחפש יעד נוסף — פשוט ספר לי לאיזה יבשת תרצה לטייל.', 'bot');
        state.step = 1;
      }, 400);
    }
  } else if(state.step === 76) {
    // After "במה אפשר לעזור?" — yes = new search, no = goodbye
    const t76 = text.trim().toLowerCase();
    const isYes76 = ['כן','יש','בטח','כמובן','סבבה','אשמח','ok','yes','ודאי','בהחלט','ברור','בוודאי','למה לא','כן כן'].some(w => t76.includes(w));
    const isNo76  = ['לא','no','לא תודה','בסדר','ביי','נו לא','זהו'].some(w => t76 === w || t76.startsWith(w));
    if(isYes76 || wantsNewSearch(text)) {
      startNewSearch();
    } else if(isNo76) {
      const replies = ['בכיף! שיהיה לך טיול נהדר! ✈️🌟','שמחתי לעזור! 😊 תהנה בחופשה! 🏖️','ברצון! תהנה 😄🌴'];
      botDelay(()=>{ addMsg(replies[Math.floor(Math.random()*replies.length)], 'bot'); state.step = 7; }, 400);
    } else {
      outOfScopeReply();
    }
  } else if(state.step === 7) {
    const t7 = text.trim().toLowerCase();
    if(wantsNewSearch(text)) { startNewSearch(); return; }
    const isThankYou7 = ['תודה','thanks','thank','טנקס','תנקס','tnx','thx','תנקיו','merci'].some(w => t7.includes(w));
    if(isThankYou7) {
      const replies = ['בכיף! 😊 שיהיה טיול מהנה! ✈️','ברצון! תהנה 🌴😄','בכיף! 🎉'];
      botDelay(()=> addMsg(replies[Math.floor(Math.random()*replies.length)], 'bot'), 400);
    } else if(isOutOfScopeQuestion(text)) {
      outOfScopeReply();
    } else {
      outOfScopeReply();
    }
  }
}

// Start the chat
document.addEventListener('DOMContentLoaded', () => botDelay(step0, 400));
if(document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(() => { if(msgs.children.length === 0) botDelay(step0, 400); }, 300);
}
